name: StatVision Deploy

on:
  push:
    branches: [ main, master, test ]
  workflow_dispatch: {}

env:
  PROJECT_ID: statsvision-477017
  REGION: us-central1
  # Modern Registry Path
  REGISTRY: us-central1-docker.pkg.dev/statsvision-477017/statvision-repo
  API_SERVICE: statvision-api
  WORKER_SERVICE: statvision-worker
  GEMINI_MODEL_NAME: ${{ vars.GEMINI_MODEL_NAME }}
  VIDEO_UPLOAD_TOPIC_NAME: video-upload-events
  CHUNK_ANALYSIS_TOPIC_NAME: chunk-analysis
  VIDEO_ANALYSIS_RESULTS_TOPIC_NAME: video-analysis-results
  JOB_PROGRESS_TOPIC_NAME: job-progress

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Set Environment Variables
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/test" ]]; then
            echo "ENV_SUFFIX=-test" >> $GITHUB_ENV
            echo "MAX_INSTANCES=1" >> $GITHUB_ENV
            echo "DB_URL=${{ secrets.TEST_DATABASE_URL }}" >> $GITHUB_ENV
          else
            echo "ENV_SUFFIX=-prod" >> $GITHUB_ENV
            echo "MAX_INSTANCES=10" >> $GITHUB_ENV
            # Use same DB as dev for now
            echo "DB_URL=${{ secrets.TEST_DATABASE_URL }}" >> $GITHUB_ENV
          fi

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Authorize Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Run Database Migrations
        if: github.ref == 'refs/heads/test'
        run: npm run migrate:run
        env:
          DATABASE_URL: ${{ env.DB_URL }}

      - name: Sync Pub/Sub Infrastructure
        run: npm run infra:pubsub
        env:
          GCP_PROJECT_ID: ${{ env.PROJECT_ID }}
          # Pass suffixes/overrides if needed (the script uses the same env vars as Cloud Run)
          VIDEO_UPLOAD_TOPIC_NAME: ${{ env.VIDEO_UPLOAD_TOPIC_NAME }}${{ env.ENV_SUFFIX }}
          CHUNK_ANALYSIS_TOPIC_NAME: ${{ env.CHUNK_ANALYSIS_TOPIC_NAME }}${{ env.ENV_SUFFIX }}
          VIDEO_ANALYSIS_RESULTS_TOPIC_NAME: ${{ env.VIDEO_ANALYSIS_RESULTS_TOPIC_NAME }}${{ env.ENV_SUFFIX }}
          JOB_PROGRESS_TOPIC_NAME: ${{ env.JOB_PROGRESS_TOPIC_NAME }}${{ env.ENV_SUFFIX }}
          # Suffixes for subscriptions
          VIDEO_UPLOAD_SUBSCRIPTION_NAME: video-upload-events-sub${{ env.ENV_SUFFIX }}
          CHUNK_ANALYSIS_SUBSCRIPTION_NAME: chunk-analysis-sub${{ env.ENV_SUFFIX }}
          VIDEO_ANALYSIS_RESULTS_SUBSCRIPTION_NAME: video-analysis-results-sub${{ env.ENV_SUFFIX }}
          CHUNK_ANALYSIS_RESULTS_SUBSCRIPTION_NAME: chunk-analysis-results-sub${{ env.ENV_SUFFIX }}
          JOB_PROGRESS_SUBSCRIPTION_NAME: job-progress-sub${{ env.ENV_SUFFIX }}

      # --- API Service ---
      - name: Build and Push API Container
        run: |
          docker build -f api/Dockerfile -t ${{ env.REGISTRY }}/${{ env.API_SERVICE }}${{ env.ENV_SUFFIX }}:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/${{ env.API_SERVICE }}${{ env.ENV_SUFFIX }}:${{ github.sha }}
      
      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy ${{ env.API_SERVICE }}${{ env.ENV_SUFFIX }} \
            --image ${{ env.REGISTRY }}/${{ env.API_SERVICE }}${{ env.ENV_SUFFIX }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --max-instances ${{ env.MAX_INSTANCES }} \
            --set-env-vars "NODE_ENV=production,GCP_PROJECT_ID=${{ env.PROJECT_ID }},UPLOAD_DIR=/tmp/uploads,UPLOAD_BUCKET=statvision-uploads${{ env.ENV_SUFFIX }},USE_MOCK_AUTH=false,DATABASE_URL=${{ env.DB_URL }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},GEMINI_MODEL_NAME=${{ env.GEMINI_MODEL_NAME }},AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }},AUTH0_AUDIENCE=${{ secrets.AUTH0_AUDIENCE }},AUTH0_ISSUER=${{ secrets.AUTH0_ISSUER }},AUTH0_JWKS_URI=${{ secrets.AUTH0_JWKS_URI }},VIDEO_UPLOAD_TOPIC_NAME=${{ env.VIDEO_UPLOAD_TOPIC_NAME }}${{ env.ENV_SUFFIX }},CHUNK_ANALYSIS_TOPIC_NAME=${{ env.CHUNK_ANALYSIS_TOPIC_NAME }}${{ env.ENV_SUFFIX }},VIDEO_ANALYSIS_RESULTS_TOPIC_NAME=${{ env.VIDEO_ANALYSIS_RESULTS_TOPIC_NAME }}${{ env.ENV_SUFFIX }},VIDEO_ANALYSIS_RESULTS_SUBSCRIPTION_NAME=video-analysis-results-sub${{ env.ENV_SUFFIX }},CHUNK_ANALYSIS_RESULTS_SUBSCRIPTION_NAME=chunk-analysis-results-sub${{ env.ENV_SUFFIX }},JOB_PROGRESS_SUBSCRIPTION_NAME=job-progress-sub${{ env.ENV_SUFFIX }},ORCHESTRATOR_URL=https://${{ env.WORKER_SERVICE }}${{ env.ENV_SUFFIX }}-chsbu3g4oa-uc.a.run.app/api/orchestrate-game"

      # --- Worker Service ---
      - name: Build and Push Worker Container
        run: |
          docker build -f worker/Dockerfile -t ${{ env.REGISTRY }}/${{ env.WORKER_SERVICE }}${{ env.ENV_SUFFIX }}:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/${{ env.WORKER_SERVICE }}${{ env.ENV_SUFFIX }}:${{ github.sha }}
      
      - name: Deploy Worker to Cloud Run
        run: |
          gcloud run deploy ${{ env.WORKER_SERVICE }}${{ env.ENV_SUFFIX }} \
            --image ${{ env.REGISTRY }}/${{ env.WORKER_SERVICE }}${{ env.ENV_SUFFIX }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --port 8080 \
            --max-instances ${{ env.MAX_INSTANCES }} \
            --cpu 2 \
            --memory 4Gi \
            --timeout 3600 \
            --set-env-vars "NODE_ENV=production,GCP_PROJECT_ID=${{ env.PROJECT_ID }},DATABASE_URL=${{ env.DB_URL }},UPLOAD_BUCKET=statvision-uploads${{ env.ENV_SUFFIX }},WORKER_TEMP_DIR=/tmp/statvision,GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},GEMINI_MODEL_NAME=${{ env.GEMINI_MODEL_NAME }},processingMode=PARALLEL,FFMPEG_PRESET=ultrafast,FFMPEG_VF=,ANALYZER_URL=https://${{ env.WORKER_SERVICE }}${{ env.ENV_SUFFIX }}-chsbu3g4oa-uc.a.run.app/api/analyze-chunk,VIDEO_UPLOAD_TOPIC_NAME=${{ env.VIDEO_UPLOAD_TOPIC_NAME }}${{ env.ENV_SUFFIX }},VIDEO_UPLOAD_SUBSCRIPTION_NAME=video-upload-events-sub${{ env.ENV_SUFFIX }},CHUNK_ANALYSIS_TOPIC_NAME=${{ env.CHUNK_ANALYSIS_TOPIC_NAME }}${{ env.ENV_SUFFIX }},CHUNK_ANALYSIS_SUBSCRIPTION_NAME=chunk-analysis-sub${{ env.ENV_SUFFIX }},VIDEO_ANALYSIS_RESULTS_TOPIC_NAME=${{ env.VIDEO_ANALYSIS_RESULTS_TOPIC_NAME }}${{ env.ENV_SUFFIX }},VIDEO_ANALYSIS_RESULTS_SUBSCRIPTION_NAME=video-analysis-results-sub${{ env.ENV_SUFFIX }},CHUNK_ANALYSIS_RESULTS_TOPIC_NAME=chunk-analysis-results${{ env.ENV_SUFFIX }},CHUNK_ANALYSIS_RESULTS_SUBSCRIPTION_NAME=chunk-analysis-results-sub${{ env.ENV_SUFFIX }},JOB_PROGRESS_TOPIC_NAME=${{ env.JOB_PROGRESS_TOPIC_NAME }}${{ env.ENV_SUFFIX }},JOB_PROGRESS_SUBSCRIPTION_NAME=job-progress-sub${{ env.ENV_SUFFIX }}"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && '--prod' || '' }}
