name: StatVision Deploy

on:
  push:
    branches: [ main, master, test ]
  workflow_dispatch: {}

env:
  PROJECT_ID: statsvision-477017
  REGION: us-central1
  # Modern Registry Path
  REGISTRY: us-central1-docker.pkg.dev/statsvision-477017/statvision-repo
  API_SERVICE: statvision-api
  WORKER_SERVICE: statvision-worker
  GEMINI_MODEL_NAME: gemini-2.5-flash
  VIDEO_UPLOAD_TOPIC_NAME: video-upload-events
  CHUNK_ANALYSIS_TOPIC_NAME: chunk-analysis

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set Environment Variables
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/test" ]]; then
            echo "ENV_SUFFIX=-test" >> $GITHUB_ENV
            echo "MAX_INSTANCES=1" >> $GITHUB_ENV
            echo "DB_URL=${{ secrets.TEST_DATABASE_URL }}" >> $GITHUB_ENV
          else
            echo "ENV_SUFFIX=" >> $GITHUB_ENV
            echo "MAX_INSTANCES=10" >> $GITHUB_ENV
            echo "DB_URL=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV
          fi

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Authorize Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # --- API Service ---
      - name: Build and Push API Container
        run: |
          docker build -f api/Dockerfile -t ${{ env.REGISTRY }}/${{ env.API_SERVICE }}${{ env.ENV_SUFFIX }}:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/${{ env.API_SERVICE }}${{ env.ENV_SUFFIX }}:${{ github.sha }}
      
      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy ${{ env.API_SERVICE }}${{ env.ENV_SUFFIX }} \
            --image ${{ env.REGISTRY }}/${{ env.API_SERVICE }}${{ env.ENV_SUFFIX }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --max-instances ${{ env.MAX_INSTANCES }} \
            --set-env-vars "NODE_ENV=production,USE_MOCK_AUTH=false,DATABASE_URL=${{ env.DB_URL }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},GEMINI_MODEL_NAME=${{ env.GEMINI_MODEL_NAME }},AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }},AUTH0_AUDIENCE=${{ secrets.AUTH0_AUDIENCE }},AUTH0_ISSUER=${{ secrets.AUTH0_ISSUER }},AUTH0_JWKS_URI=${{ secrets.AUTH0_JWKS_URI }},VIDEO_UPLOAD_TOPIC_NAME=${{ env.VIDEO_UPLOAD_TOPIC_NAME }}${{ env.ENV_SUFFIX }},CHUNK_ANALYSIS_TOPIC_NAME=${{ env.CHUNK_ANALYSIS_TOPIC_NAME }}${{ env.ENV_SUFFIX }}"

      # --- Worker Service ---
      - name: Build and Push Worker Container
        run: |
          docker build -f worker/Dockerfile -t ${{ env.REGISTRY }}/${{ env.WORKER_SERVICE }}${{ env.ENV_SUFFIX }}:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/${{ env.WORKER_SERVICE }}${{ env.ENV_SUFFIX }}:${{ github.sha }}
      
      - name: Deploy Worker to Cloud Run
        run: |
          gcloud run deploy ${{ env.WORKER_SERVICE }}${{ env.ENV_SUFFIX }} \
            --image ${{ env.REGISTRY }}/${{ env.WORKER_SERVICE }}${{ env.ENV_SUFFIX }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --port 8080 \
            --max-instances ${{ env.MAX_INSTANCES }} \
            --set-env-vars "NODE_ENV=production,DATABASE_URL=${{ env.DB_URL }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},GEMINI_MODEL_NAME=${{ env.GEMINI_MODEL_NAME }},processingMode=PARALLEL,VIDEO_UPLOAD_TOPIC_NAME=${{ env.VIDEO_UPLOAD_TOPIC_NAME }}${{ env.ENV_SUFFIX }},VIDEO_UPLOAD_SUBSCRIPTION_NAME=video-upload-events-sub${{ env.ENV_SUFFIX }},CHUNK_ANALYSIS_TOPIC_NAME=${{ env.CHUNK_ANALYSIS_TOPIC_NAME }}${{ env.ENV_SUFFIX }},CHUNK_ANALYSIS_SUBSCRIPTION_NAME=chunk-analysis-sub${{ env.ENV_SUFFIX }},VIDEO_ANALYSIS_RESULTS_TOPIC_NAME=video-analysis-results${{ env.ENV_SUFFIX }},VIDEO_ANALYSIS_RESULTS_SUBSCRIPTION_NAME=video-analysis-results-sub${{ env.ENV_SUFFIX }},CHUNK_ANALYSIS_RESULTS_SUBSCRIPTION_NAME=chunk-analysis-results-sub${{ env.ENV_SUFFIX }}"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && '--prod' || '' }}
          working-directory: frontend
