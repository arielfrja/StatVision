name: StatVision CI

on:
  push:
    branches: [ main, develop, master, test ]
  pull_request:
    branches: [ main, develop, master, test ]
  workflow_dispatch: {}

jobs:
  common-ci:
    name: Common CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build Common
        run: npm run build -w common

  api-ci:
    name: API CI
    runs-on: ubuntu-latest
    needs: common-ci
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build Common (Dependency)
        run: npm run build -w common
      - name: Type Check API
        run: npm run type-check -w api
      - name: Build API
        run: npm run build -w api

  worker-ci:
    name: Worker CI
    runs-on: ubuntu-latest
    needs: common-ci
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build Common (Dependency)
        run: npm run build -w common
      - name: Type Check Worker
        run: npm run type-check -w worker
      - name: Build Worker
        run: npm run build -w worker

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build Frontend
        run: npm run build -w frontend
        env:
          NODE_ENV: production
